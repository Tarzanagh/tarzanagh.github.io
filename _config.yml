# Site Settings
locale: "en-US"
title: "Home"
title_separator: "-"
name: &name "Davoud Ataee Tarzanagh"
description: &description "AI Scientist at Samsung SDS Research America"
url: https://tarzanagh.github.io
baseurl: ""
repository: "tarzanagh/tarzanagh.github.io"
teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false

# SEO Related
google_site_verification:
bing_site_verification:

# Analytics
analytics:
  provider: "google-universal"
  google:
    tracking_id:

# Site Author
author:
  name: "Davoud Ataee Tarzanagh"
  avatar: "Davoud.png"
  bio: "AI Scientist at Samsung SDS Research America"
  location: "Mountain View, CA"
  email: "tarzanagh@gmail.com"
  googlescholar: "https://scholar.google.com/citations?user=Djtvz_0AAAAJ&hl=en"
  github: "Tarzanagh"
  linkedin: "davoud-ataee-tarzanagh-4a41a6235"
  arxiv: "https://arxiv.org/search/cs?searchtype=author&query=Tarzanagh%2C+D+A"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - config
  - gulpfile.js
  - log
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Los_Angeles

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
